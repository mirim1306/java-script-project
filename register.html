<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>의료인 - 회원가입</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <nav class="navbar">
            <a href="index.html" class="nav-logo">의료인</a>
            <ul class="nav-links">
                <li><a href="index.html">홈</a></li>
                <li><a href="mypage.html">마이페이지</a></li>
            </ul>
            <div class="auth-links">
                <a href="login.html">로그인</a> | <a href="register.html">회원가입</a>
            </div>
        </nav>
    </header>

    <main class="container auth-form-container">
        <h2>회원가입</h2>
        <form id="register-form">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">비밀번호 확인</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
            <button type="submit" class="submit-btn">회원가입</button>
        </form>
        <p class="auth-link-text">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
    </main>

    <script src="js/register.js"></script>
</body>
</html>
